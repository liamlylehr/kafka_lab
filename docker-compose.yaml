services:
  kafka:
    image: confluentinc/cp-kafka:7.8.3
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_KRAFT_NODE: 'true'

      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"  # Any base64 UUID
      KAFKA_NODE_ID: 1

      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      #  1 copy of kafka metadata tracking which consumers have
      #  read from which topics
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

      #  specifies ports for clients or other brokers
      #  client port, controller port (node-to-node)
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      #  explicit address for clients
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      # explicit address for controllers
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs

    volumes:
      - kafka_kraft:/var/lib/kafka/data

volumes:
  kafka_kraft:
